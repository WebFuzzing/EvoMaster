---
openapi: 3.1.0
info:
  title: examples_multi_params
  description: examples_multi_params
  version: 1.0.0
servers:
  - url: "/v2"
paths:
  "/api":
    post:
      parameters:
        - in: query
          name: x
          required: true
          schema:
            type: string
          examples:
            Bar:
              value: xbar
            Foo:
              value: xfoo
        - in: query
          name: y
          required: true
          schema:
            type: string
          examples:
            Bar:
              value: ybar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: integer
                name:
                  type: string
                extra:
                  type: integer
            examples:
              Bar:
                value:
                  id: 42
                  name: nameB
              Foo:
                value:
                  id: 123
                  name: nameF
                  extra: 77
              Hello:
                value:
                  id: 667
      responses:
        '200':
          description: OK