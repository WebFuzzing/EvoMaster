---
openapi: 3.1.0
info:
  title: a schema
  version: 1.0.0
servers:
  - url: "/v2"
paths:
  "/api":
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                  examples:
                    - id : 42
                      name: Bar
                - $ref: '#/components/schemas/Dto'
            examples:
              Foo:
                value:
                  id: 123
                  name: Foo
                  extra: some extra
      responses:
        '200':
          description: OK
components:
  schemas:
    Dto:
      type: object
      additionalProperties: false
      properties:
        extra:
          type: string
      example:
        extra: Hello